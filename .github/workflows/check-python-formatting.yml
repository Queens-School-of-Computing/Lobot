name: Check Python Formatting

on:
  pull_request:

jobs:
  stage_files:
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: '**/*.py'

      - name: List changed files
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: echo $CHANGED_FILES

  check_style:
    needs: stage_files
    if: needs.stage_files.outputs.any_changed == 'true'
    env:
      CHANGED_FILES: ${{ needs.stage_files.outputs.changed_files }}
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: List changed files (again)
        run: echo $CHANGED_FILES

      - name: Init ruff and print version
        uses: astral-sh/ruff-action@v3
        with:
          args: --version
      - name: Check python format
        run: ruff format --check --diff ${CHANGED_FILES}
      - name: Check python syntax
        run: ruff check --diff ${CHANGED_FILES}
