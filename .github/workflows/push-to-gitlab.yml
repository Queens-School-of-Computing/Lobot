on:
  push:
    branches:
      - 'dev' # TODO Replace with main when working

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Push to GitLab
        uses: kujov/gitlab-sync@main
        with:
          gitlab_url: ${{ secrets.GITLAB_URL }}
          username: ${{ secrets.GITLAB_USERNAME }}
          gitlab_pat: ${{ secrets.GITLAB_TOKEN }}
