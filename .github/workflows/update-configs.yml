name: Triggered Update Configuration to Files

on:
  repository_dispatch:
    types:
      - cluster-info-changed

jobs:
  update_file:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Write out payload
        run: echo '${{ toJson(github.event.client_payload.data) }}' | jq -c > members-payload.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - run: pip install -r ./requirements.txt

      - name: Update runtime_setting.yaml
        run: python3 ./.github/scripts/generate-runtime-config.py
        env:
          INPUT_FILE: ./members-payload.json
          OUTPUT_FILE: ./runtime_setting.yaml

      - name: Update group-roles.yaml
        run: python3 ./.github/scripts/generate-group-roles.py
        env:
          INPUT_FILE: ./members-payload.json
          OUTPUT_FILE: ./group-roles.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PR_BOT_TOKEN }}
          title: 'chore: automated config update'
          commit-message: 'chore: automated config update'
          body: "This pull request was triggered by a change in the \
            \"Cluster Users\" data source. Please cross-reference \
            that the change here matches the corresponding items there."
          branch: update-jupyter-configs
          add-paths: |
            ./runtime_setting.yaml
            ./group-roles.yaml
          labels: infra,bot
          team-reviewers: reviewers
