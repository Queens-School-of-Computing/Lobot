stage_files:
  script:
    - echo "Checking for python files changed from '$CI_MERGE_REQUEST_TARGET_BRANCH_SHA'..."
    - files=$(git diff-tree --name-only --no-commit-id $CI_MERGE_REQUEST_TARGET_BRANCH_SHA)
    - echo "files=$files"
    - py_files=$(echo $files | grep \.py)
    - echo "py_files=$py_files"
  rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
