default:
  image:
    name: lobot-runner:latest
    pull_policy: if-not-present

workflow:
  rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

stage_files:
  script: |
    set -vx
    echo "Checking for python files changed from 'main'..."
    git fetch origin main --depth 1
    git branch -a
    files=$(git diff-tree --name-only --no-commit-id main..${CI_COMMIT_REF_NAME})
    echo "files=$files"
    py_files=$(echo $files | grep \.py)
    echo "py_files=$py_files"
