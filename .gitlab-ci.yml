default:
  image:
    name: lobot-runner:latest
    pull_policy: if-not-present

include:
  - local: '.gitlab/workflows/check-python-formatting.yml'

stub:
  variables:
    CAT: "MEOW"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
    - when: never
  script: |
    echo "meow meow $CAT"
