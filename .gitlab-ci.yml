default:
  image:
    name: lobot-runner:latest
    pull_policy: if-not-present

workflow:
  rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

stages:
  - stage
  - check

stage_files:
  stage: stage
  script: |
    set -vx
    set +e
    git --version
    echo "Checking for python files changed from 'main'..."
    git fetch origin main dev --depth 1
    git branch -a
    git switch dev
    git status -bs
    git show-branch main dev HEAD
    files=$(git diff --name-only --no-commit-id origin/main..origin/${CI_COMMIT_REF_NAME})
    echo "files=$files"
    py_files=$(echo -n $files | xargs -n1 echo |grep \.py)
    if [ -n "$py_files" ]
    then
      echo "python files in changeset"
      echo "$py_files" > changed-python-files.txt

      exit 0
    fi
    echo "py_files=$py_files"

ruff-check:
  stage: check
  image: python:3.12
  rules:
    - if: $CI_PY_FILES_TO_CHECK

  script: |
    if [[ -f ./changed-python-files.txt ]]
    then
      pip install ruff
      ruff check "$CI_PY_FILES_TO_CHECK"
    else
      echo "No python files to check"

      exit 0
    fi
