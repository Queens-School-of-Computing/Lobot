default:
  image:
    name: lobot-runner:latest
    pull_policy: if-not-present

workflow:
  rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

stages:
  - stage
  - check

stage_files:
  stage: stage
  script: |
    echo "Checking for python files changed from 'main'..."
    git fetch origin main dev --depth 1
    git switch dev
    files=$(git diff --name-only --no-commit-id origin/main..origin/${CI_COMMIT_REF_NAME})
    py_files=$(echo -n $files | xargs -n1 echo |grep \.py)
    if [ -n "$py_files" ]
    then
      echo "$py_files" > changed-python-files.txt
    fi
  artifacts:
    paths:
      - ./changed-python-files.txt

ruff_check:
  stage: check
  image: python:3.12

  script: |
    if [[ ! -f ./changed-python-files.txt ]]
      echo "No python files to check"
      exit 0
    fi

    pip install ruff
    ruff check $(cat ./changed-python-files.txt)
