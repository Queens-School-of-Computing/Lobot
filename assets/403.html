<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lobot — 403</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }

    .error-code {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.75rem;
      white-space: nowrap;
    }

    p.subtitle {
      font-size: 1.05rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .home-link {
      display: inline-block;
      color: #7c93c3;
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .home-link:hover { color: #a5b4fc; }

    .footer {
      font-size: 0.8rem;
      color: #475569;
    }

    .footer a {
      color: #64748b;
      text-decoration: none;
    }

    .footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🚫</span>
    <p class="error-code">403</p>
    <h1>Hey. You're not permitted in there. It's restricted.</h1>
    <p class="subtitle">
      You don't have access to this page.<br />
      If you think this is a mistake, contact the help desk.
    </p>

    <p><a class="home-link" href="/">← Back to home</a></p>

    <p class="footer">
      Queen's School of Computing &mdash;
      <a href="mailto:help@cs.queensu.ca">help@cs.queensu.ca</a>
    </p>
  </div>
</body>
</html>
