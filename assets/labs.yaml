# =============================================================================
# labs.yaml — JupyterHub spawner form configuration
# Edit this file, then run:  python3 assets/generate_html.py
# =============================================================================
#
# LAB CONFIGURATION REFERENCE
# ----------------------------
# Each entry under `labs:` maps to one HTML file in assets/html/<lab_id>.html
#
# Required fields per lab:
#   cpu_options   - list of CPU core choices
#   gpu_options   - list of GPU choices
#   ram_options   - list of RAM choices
#
# Optional fields per lab:
#   cpu_label     - CPU model shown in brackets, e.g. [DUAL Intel Xeon Gold 6338]
#                   Omit entirely if you don't want a model name shown.
#   cpu_help      - Override the default CPU help text shown below the dropdown.
#                   Default: "Reserved number of cores.  Choose minimum. Server
#                             will use more if needed and available automatically."
#   ram_help      - Override the default RAM help text shown below the dropdown.
#                   Default: "The amount of memory to be allocated."
#   images        - Override the global image list for this lab only.
#                   Uses the same format as the top-level `images` list.
#                   Omit to use the global list.
#   mig_profiles  - Only for MIG-partitioned labs (e.g. lobot_blackwell).
#                   List of {value, label, slices, mem_gb} — one entry per
#                   NVIDIA MIG profile. `value` must match a key in the
#                   gpu-operator `mig-config` ConfigMap (see
#                   Lobot-tools/lobot_gpu_timeslicing_mig.md). `slices` is
#                   the number of GPU instances per physical GPU under that
#                   profile (used to compute the gpu_options list per mode
#                   client-side). Presence of this key adds a "GPU memory
#                   partitioning" selector to the form.
#   gpu_count     - Physical GPU count on the node (used with mig_profiles
#                   to compute max slices per mode: gpu_count * slices).
#
# Option format (cpu_options / gpu_options / ram_options):
#   - value: "8.0"        # the form value submitted to JupyterHub (required)
#     label: "8 cores"    # the text shown to the user (required)
#     default: true       # pre-selected option — can be on any item, not just the first.
                      # Exactly one per list. If omitted, browser picks the first.
#
# Full example lab (all fields shown):
#   mylab:
#     cpu_label: DUAL Intel Xeon Gold 6338
#     cpu_help: "Reserved number of cores.  Choose minimum. Server will use more if needed and available automatically."
#     cpu_options:
#       - {value: "8.0",  label: "8 cores",  default: true}
#       - {value: "16.0", label: "16 cores"}
#       - {value: "32.0", label: "32 cores"}
#     gpu_options:
#       - {value: "0", label: "I don't need a GPU for now.", default: true}
#       - {value: "1", label: "1x A100 (80G)"}
#       - {value: "2", label: "2x A100 (80G)"}
#     ram_options:
#       - {value: "64G",  label: "64G RAM",  default: true}
#       - {value: "128G", label: "128G RAM"}
#       - {value: "256G", label: "256G RAM"}
#     ram_help: "The amount of memory to be allocated."
#     images:                                                # omit to use global list
#       - tag: 13.2.1cudnn-2.20.0tf-matlab-ollama-claude-qsc-u24.04-20260424-nightly
#         label: "CUDA 13.2 · TF 2.20 · Apr 24, 2026 (nightly)"
#         default: true
#       - tag: 13.0.2cudnn-2.20.0tf-matlab-ollama-claude-qsc-u24.04-20260313
#         label: "CUDA 13.0 · TF 2.20 · Mar 13, 2026"
#
# =============================================================================

