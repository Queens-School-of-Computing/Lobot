<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lobot — Back Shortly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }

    p.subtitle {
      font-size: 1.05rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .countdown-box {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #1e2535;
      border: 1px solid #2d3748;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      color: #64748b;
      margin-bottom: 2.5rem;
    }

    .countdown-box span#seconds {
      font-weight: 700;
      font-size: 1.1rem;
      color: #7c93c3;
      min-width: 1.5ch;
      display: inline-block;
    }

    .progress-bar-track {
      width: 100%;
      height: 4px;
      background: #1e2535;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2.5rem;
    }

    .progress-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #4c6ef5, #7c93c3);
      border-radius: 2px;
      transform-origin: left;
      animation: shrink 30s linear forwards;
    }

    @keyframes shrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    .footer {
      font-size: 0.8rem;
      color: #475569;
    }

    .footer a {
      color: #64748b;
      text-decoration: none;
    }

    .footer a:hover {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🚀</span>
    <h1>Lobot is getting an upgrade</h1>
    <p class="subtitle">
      We're restarting the hub to bring you something better.<br />
      This usually takes about 30 seconds.
    </p>

    <div class="countdown-box">
      Checking again in <span id="seconds">30</span>s
    </div>

    <div class="progress-bar-track">
      <div class="progress-bar-fill"></div>
    </div>

    <p class="footer">
      Queen's School of Computing &mdash;
      <a href="mailto:help@cs.queensu.ca">help@cs.queensu.ca</a>
    </p>
  </div>

  <script>
    var seconds = 30;
    var el = document.getElementById('seconds');
    var interval = setInterval(function () {
      seconds -= 1;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        location.reload();
      }
    }, 1000);
  </script>
</body>
</html>
