[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "script_integration: dry-run shell script tests that send real emails and create cluster pods (opt-in)",
]
addopts = "-m 'not script_integration'"

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
# Enable all pycodestyle & Pyflakes rules
select = ["E", "F"]
# Ignore line-too-long issues that linter can't fix
ignore = ["E501"]

[tool.ruff.format]
preview = true
quote-style = "preserve"
skip-magic-trailing-comma = false
